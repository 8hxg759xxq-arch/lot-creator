<!DOCTYPE html>
<html>

<head>

<title>Site Plan Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
margin:20px;
}

#container{
display:flex;
gap:40px;
}

canvas{
border:1px solid #999;
}

input{
width:60px;
}

.controls{
width:250px;
}

button{
margin-top:5px;
}

</style>

</head>

<body>

<h2>Lot Site Plan Generator</h2>

<div id="container">

<div class="controls">

Length (m)<br>
<input id="length">

<br><br>

Angle (D M S)<br>

<input id="deg" placeholder="°">
<input id="min" placeholder="'">
<input id="sec" placeholder='"'>

<br><br>

<button onclick="addLine()">Add Line</button>
<button onclick="draw()">Draw</button>
<button onclick="rotateLot()">Rotate 90°</button>
<button onclick="exportPDF()">Export A3</button>
<button onclick="clearLines()">Clear</button>

<h3>Lines</h3>
<ul id="lines"></ul>

<h3 id="area">Area:</h3>

</div>

<canvas id="canvas" width="900" height="650"></canvas>

</div>

<script>

let lines=[]
let rotation=0

function dmsToDeg(d,m,s){

d=parseFloat(d)||0
m=parseFloat(m)||0
s=parseFloat(s)||0

return d+(m/60)+(s/3600)

}

function addLine(){

let length=parseFloat(document.getElementById("length").value)

let d=document.getElementById("deg").value
let m=document.getElementById("min").value
let s=document.getElementById("sec").value

let angle=dmsToDeg(d,m,s)

if(isNaN(length)) return

lines.push({length,angle})

let li=document.createElement("li")

li.textContent=length+"m @ "+angle.toFixed(3)+"°"

document.getElementById("lines").appendChild(li)

}

function rotateLot(){

rotation+=90

draw()

}

function clearLines(){

lines=[]
rotation=0

document.getElementById("lines").innerHTML=""
document.getElementById("area").innerText="Area:"

let ctx=document.getElementById("canvas").getContext("2d")
ctx.clearRect(0,0,900,650)

}

function calculatePoints(){

let pts=[[0,0]]

let angle=0
let x=0
let y=0

for(let l of lines){

angle+=l.angle*Math.PI/180

x+=l.length*Math.cos(angle)
y+=l.length*Math.sin(angle)

pts.push([x,y])

}

return pts

}

function rotatePoints(points){

let rad=rotation*Math.PI/180

return points.map(p=>{

let x=p[0]
let y=p[1]

return [
x*Math.cos(rad)-y*Math.sin(rad),
x*Math.sin(rad)+y*Math.cos(rad)
]

})

}

function draw(){

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,900,650)

let pts=calculatePoints()

pts=rotatePoints(pts)

let xs=pts.map(p=>p[0])
let ys=pts.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)

let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let w=maxx-minx
let h=maxy-miny

let scale=Math.min(700/(w||1),500/(h||1))

let screen=[]

for(let p of pts){

let px=(p[0]-minx)*scale+80
let py=600-(p[1]-miny)*scale

screen.push([px,py])

}

ctx.beginPath()

screen.forEach((p,i)=>{

if(i==0) ctx.moveTo(p[0],p[1])
else ctx.lineTo(p[0],p[1])

})

ctx.stroke()

ctx.font="12px Arial"

for(let i=0;i<screen.length-1;i++){

let mx=(screen[i][0]+screen[i+1][0])/2
let my=(screen[i][1]+screen[i+1][1])/2

ctx.fillText(lines[i].length+"m",mx,my)

}

let area=polygonArea(pts)

document.getElementById("area").innerText="Area: "+area.toFixed(2)+" m²"

}

function polygonArea(points){

let area=0

for(let i=0;i<points.length;i++){

let j=(i+1)%points.length

area+=points[i][0]*points[j][1]
area-=points[j][0]*points[i][1]

}

return Math.abs(area/2)

}

function exportPDF(){

const {jsPDF}=window.jspdf

let pts=calculatePoints()

pts=rotatePoints(pts)

let pdf=new jsPDF({
orientation:"portrait",
unit:"mm",
format:"a3"
})

let scale=10

let pageWidth=297
let pageHeight=420

let xs=pts.map(p=>p[0])
let ys=pts.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)

let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let lotWidth=(maxx-minx)*scale
let lotHeight=(maxy-miny)*scale

let offsetX=(pageWidth-lotWidth)/2-minx*scale
let offsetY=(pageHeight-lotHeight)/2-miny*scale

pdf.setLineWidth(0.7)

for(let i=0;i<pts.length-1;i++){

let x1=pts[i][0]*scale+offsetX
let y1=pts[i][1]*scale+offsetY

let x2=pts[i+1][0]*scale+offsetX
let y2=pts[i+1][1]*scale+offsetY

pdf.line(x1,y1,x2,y2)

let mx=(x1+x2)/2
let my=(y1+y2)/2

pdf.setFontSize(9)
pdf.text(lines[i].length+"m",mx,my)

}

pdf.setFontSize(12)
pdf.text("SITE PLAN",20,20)

pdf.setFontSize(9)
pdf.text("Scale 1:100 @ A3",20,28)

pdf.addImage("logos.png","PNG",180,380,100,25)

pdf.save("site-plan.pdf")

}

</script>

</body>

</html>
