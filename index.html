<!DOCTYPE html>
<html>
<head>

<title>Lot Site Plan Designer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f3f5f7;
}

header{
background:#1e293b;
color:white;
padding:14px 20px;
font-size:18px;
font-weight:600;
}

#container{
display:flex;
height:calc(100vh - 52px);
}

#panel{
width:380px;
min-width:260px;
max-width:700px;
background:white;
padding:20px;
box-shadow:2px 0 8px rgba(0,0,0,0.08);
overflow:auto;
}

#divider{
width:6px;
cursor:col-resize;
background:#e2e8f0;
}

canvas{
flex:1;
background:white;
cursor:grab;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
border-bottom:1px solid #eee;
padding:6px;
text-align:center;
}

input{
width:55px;
padding:4px;
border:1px solid #ddd;
border-radius:4px;
}

button{
margin-top:6px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<header>Lot Site Plan Designer</header>

<div id="container">

<div id="panel">

<h3>Start Direction</h3>

<select id="startDirection">
<option value="0">East</option>
<option value="90">North</option>
<option value="180">West</option>
<option value="270">South</option>
</select>

<h3>Boundary Direction</h3>

<select id="directionMode">
<option value="cw">Clockwise</option>
<option value="ccw">Counter Clockwise</option>
</select>

<h3>Boundary Input</h3>

<table id="lineTable">
<tr>
<th>Length</th>
<th>°</th>
<th>'</th>
<th>"</th>
<th>Type</th>
<th>Vertical</th>
</tr>
</table>

<button onclick="addLineRow()">Add Line</button>
<button onclick="generateLot()">Generate Lot</button>
<button onclick="autoCloseLot()">Auto Close Lot</button>

<h3>Tools</h3>

<button onclick="rotateLot()">Rotate</button>
<button onclick="flipLot()">Flip</button>
<button onclick="clearLot()">Clear</button>

<h3>Export</h3>

<button onclick="exportPDF()">Generate PDF</button>

</div>

<div id="divider"></div>

<canvas id="canvas" width="1200" height="800"></canvas>

</div>

<script>

let lines=[]
let rotation=0
let flip=1
let zoom=1
let panX=0
let panY=0

function addLineRow(){

let row=document.getElementById("lineTable").insertRow()

row.innerHTML=`
<td><input></td>
<td><input></td>
<td><input></td>
<td><input></td>
<td>
<select>
<option value="interior">Interior</option>
<option value="external">External</option>
</select>
</td>
<td><input type="checkbox"></td>
`

}

function generateLot(){

lines=[]

let rows=document.querySelectorAll("#lineTable tr")

rows.forEach((row,i)=>{

if(i===0)return

let inputs=row.querySelectorAll("input")
let type=row.querySelector("select").value

let length=parseFloat(inputs[0].value)

let d=parseFloat(inputs[1].value)||0
let m=parseFloat(inputs[2].value)||0
let s=parseFloat(inputs[3].value)||0

let angle=d+(m/60)+(s/3600)

let vertical=inputs[4].checked

if(!isNaN(length)){

lines.push({length,angle,type,vertical})

}

})

draw()

}

function calculatePoints(){

let pts=[[0,0]]

let direction=parseFloat(
document.getElementById("startDirection").value
)*Math.PI/180

let mode=document.getElementById("directionMode").value

let x=0
let y=0

lines.forEach(l=>{

x+=l.length*Math.cos(direction)
y+=l.length*Math.sin(direction)

pts.push([x,y])

let turn=l.type==="interior"
?(180-l.angle)*Math.PI/180
:l.angle*Math.PI/180

direction+=mode==="cw"?-turn:turn

})

return pts

}

function autoCloseLot(){

generateLot()

let pts=calculatePoints()

let last=pts[pts.length-1]

let dx=0-last[0]
let dy=0-last[1]

let length=Math.sqrt(dx*dx+dy*dy)

alert("Closing boundary length = "+length.toFixed(2)+"m")

let table=document.getElementById("lineTable")

let row=table.insertRow()

row.innerHTML=`
<td><input value="${length.toFixed(2)}"></td>
<td><input></td>
<td><input></td>
<td><input></td>
<td>
<select>
<option value="interior">Interior</option>
<option value="external">External</option>
</select>
</td>
<td><input type="checkbox"></td>
`

generateLot()

}

function draw(){

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,canvas.width,canvas.height)

let pts=calculatePoints()

let xs=pts.map(p=>p[0])
let ys=pts.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)
let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let scale=Math.min(
900/(maxx-minx||1),
600/(maxy-miny||1)
)*zoom

ctx.save()

ctx.translate(panX,panY)

let screen=[]

pts.forEach(p=>{

let x=(p[0]-minx)*scale+150
let y=(p[1]-miny)*scale+100

screen.push([x,y])

})

ctx.beginPath()

screen.forEach((p,i)=>{
if(i===0)ctx.moveTo(p[0],p[1])
else ctx.lineTo(p[0],p[1])
})

ctx.lineWidth=2
ctx.stroke()

ctx.font="12px Arial"

for(let i=0;i<screen.length-1;i++){

let p1=screen[i]
let p2=screen[i+1]

let mx=(p1[0]+p2[0])/2
let my=(p1[1]+p2[1])/2

ctx.fillText(lines[i].length.toFixed(2)+"m",mx,my)

}

for(let i=1;i<screen.length;i++){

if(lines[i-1]){

let p=screen[i]

ctx.fillText(lines[i-1].angle.toFixed(0)+"°",p[0]+6,p[1]-6)

}

}

ctx.restore()

}

function rotateLot(){rotation+=90;draw()}
function flipLot(){flip*=-1;draw()}

function clearLot(){

lines=[]

let table=document.getElementById("lineTable")

while(table.rows.length>1)table.deleteRow(1)

addLineRow()
addLineRow()
addLineRow()

draw()

}

function exportPDF(){

generateLot()

const {jsPDF}=window.jspdf

let pdf=new jsPDF({
orientation:"portrait",
unit:"mm",
format:"a3"
})

let pts=calculatePoints()

let pageWidth=pdf.internal.pageSize.getWidth()
let pageHeight=pdf.internal.pageSize.getHeight()

pdf.rect(8,8,pageWidth-16,pageHeight-16)

let xs=pts.map(p=>p[0])
let ys=pts.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)
let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let scale=10

let offsetX=(pageWidth-(maxx-minx)*scale)/2-minx*scale
let offsetY=(pageHeight-(maxy-miny)*scale)/2

pdf.setDrawColor(200,0,0)

for(let i=0;i<pts.length-1;i++){

let x1=pts[i][0]*scale+offsetX
let y1=(pts[i][1]-miny)*scale+offsetY

let x2=pts[i+1][0]*scale+offsetX
let y2=(pts[i+1][1]-miny)*scale+offsetY

pdf.line(x1,y1,x2,y2)

}

pdf.text("Scale 1:100 @ A3",20,20)

let img=new Image()

img.onload=function(){
pdf.addImage(img,"PNG",pageWidth-108,pageHeight-33,100,25)
pdf.save("site-plan.pdf")
}

img.onerror=function(){pdf.save("site-plan.pdf")}

img.src="logos.png"

}

addLineRow()
addLineRow()
addLineRow()

</script>

</body>
</html>
