<!DOCTYPE html>
<html>
<head>

<title>Lot Site Plan Designer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f3f5f7;
}

header{
background:#1e293b;
color:white;
padding:14px 20px;
font-size:18px;
font-weight:600;
}

#container{
display:flex;
height:calc(100vh - 52px);
}

.controls{
width:360px;
background:white;
padding:20px;
box-shadow:2px 0 8px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
border-bottom:1px solid #eee;
padding:6px;
text-align:center;
}

input{
width:60px;
padding:4px;
border:1px solid #ddd;
border-radius:4px;
}

button{
margin-top:6px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
width:100%;
}

canvas{
background:white;
flex:1;
}

</style>

</head>

<body>

<header>Lot Site Plan Designer</header>

<div id="container">

<div class="controls">

<h3>Start Direction</h3>

<select id="startDirection">
<option value="0">East</option>
<option value="90">North</option>
<option value="180">West</option>
<option value="270">South</option>
</select>

<h3>Boundary Direction</h3>

<select id="directionMode">
<option value="cw">Clockwise</option>
<option value="ccw">Counter Clockwise</option>
</select>

<h3>Boundary Input</h3>

<table id="lineTable">

<tr>
<th>Length</th>
<th>°</th>
<th>'</th>
<th>"</th>
<th>Type</th>
<th>Vertical</th>
</tr>

</table>

<button onclick="addLineRow()">Add Line</button>
<button onclick="generateLot()">Generate Lot</button>

<h3>Tools</h3>

<button onclick="rotateLot()">Rotate</button>
<button onclick="flipLot()">Flip</button>
<button onclick="clearLot()">Clear</button>

<h3>Export</h3>

<button onclick="exportPDF()">Generate PDF</button>

</div>

<canvas id="canvas" width="1200" height="800"></canvas>

</div>

<script>

let lines=[]
let points=[]
let rotation=0
let flip=1

function addLineRow(){

let table=document.getElementById("lineTable")
let row=table.insertRow()

for(let i=0;i<4;i++){

let cell=row.insertCell()
let input=document.createElement("input")
cell.appendChild(input)

}

let typeCell=row.insertCell()

let select=document.createElement("select")

select.innerHTML=`
<option value="interior">Interior</option>
<option value="external">External</option>
`

typeCell.appendChild(select)

let vertCell=row.insertCell()

let check=document.createElement("input")
check.type="checkbox"

vertCell.appendChild(check)

}

function generateLot(){

lines=[]

let rows=document.querySelectorAll("#lineTable tr")

rows.forEach((row,i)=>{

if(i===0)return

let inputs=row.querySelectorAll("input")
let type=row.querySelector("select").value
let vertical=row.querySelector('input[type="checkbox"]').checked

let length=parseFloat(inputs[0].value)

let d=parseFloat(inputs[1].value)||0
let m=parseFloat(inputs[2].value)||0
let s=parseFloat(inputs[3].value)||0

let angle=d+(m/60)+(s/3600)

if(!isNaN(length)){
lines.push({length,angle,type,vertical})
}

})

draw()

}

function calculatePoints(){

let pts=[[0,0]]

let direction=parseFloat(
document.getElementById("startDirection").value
)*Math.PI/180

let mode=document.getElementById("directionMode").value

let x=0
let y=0

lines.forEach(l=>{

x+=l.length*Math.cos(direction)
y+=l.length*Math.sin(direction)

pts.push([x,y])

let turn

if(l.type==="interior"){
turn=(180-l.angle)*Math.PI/180
}else{
turn=l.angle*Math.PI/180
}

if(mode==="cw") direction-=turn
else direction+=turn

})

return pts

}

function applyVerticalRotation(pts){

let index=lines.findIndex(l=>l.vertical)

if(index===-1) return pts

let p1=pts[index]
let p2=pts[index+1]

let dx=p2[0]-p1[0]
let dy=p2[1]-p1[1]

let angle=Math.atan2(dy,dx)

let target=Math.PI/2

let rotate=target-angle

return pts.map(p=>{

let x=p[0]
let y=p[1]

return[
x*Math.cos(rotate)-y*Math.sin(rotate),
x*Math.sin(rotate)+y*Math.cos(rotate)
]

})

}

function draw(){

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,canvas.width,canvas.height)

points=applyVerticalRotation(calculatePoints())

points=points.map(p=>[p[0]*flip,p[1]])

let rad=rotation*Math.PI/180

points=points.map(p=>[
p[0]*Math.cos(rad)-p[1]*Math.sin(rad),
p[0]*Math.sin(rad)+p[1]*Math.cos(rad)
])

let xs=points.map(p=>p[0])
let ys=points.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)
let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let scale=Math.min(900/(maxx-minx||1),600/(maxy-miny||1))

let screen=[]

points.forEach(p=>{

let x=(p[0]-minx)*scale+150
let y=700-(p[1]-miny)*scale

screen.push([x,y])

})

ctx.beginPath()

screen.forEach((p,i)=>{
if(i===0) ctx.moveTo(p[0],p[1])
else ctx.lineTo(p[0],p[1])
})

ctx.stroke()

ctx.font="11px Arial"

for(let i=0;i<screen.length-1;i++){

let p1=screen[i]
let p2=screen[i+1]

let mx=(p1[0]+p2[0])/2
let my=(p1[1]+p2[1])/2

ctx.fillText(lines[i].length.toFixed(2)+"m",mx,my)

}

for(let i=1;i<screen.length;i++){

if(lines[i-1]){

let p=screen[i]

ctx.fillText(lines[i-1].angle.toFixed(0)+"°",p[0]+5,p[1]-5)

}

}

}

function rotateLot(){
rotation+=90
draw()
}

function flipLot(){
flip*=-1
draw()
}

function clearLot(){

lines=[]
points=[]
rotation=0
flip=1

let table=document.getElementById("lineTable")

while(table.rows.length>1){
table.deleteRow(1)
}

addLineRow()
addLineRow()
addLineRow()

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")
ctx.clearRect(0,0,canvas.width,canvas.height)

}

function exportPDF(){

generateLot()

const {jsPDF}=window.jspdf

let pdf=new jsPDF({
orientation:"portrait",
unit:"mm",
format:"a3"
})

let pageWidth=pdf.internal.pageSize.getWidth()
let pageHeight=pdf.internal.pageSize.getHeight()

pdf.rect(8,8,pageWidth-16,pageHeight-16)

let pts=applyVerticalRotation(calculatePoints())

let xs=pts.map(p=>p[0])
let ys=pts.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)
let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let scale=10

let offsetX=(pageWidth-(maxx-minx)*scale)/2-minx*scale
let offsetY=(pageHeight-(maxy-miny)*scale)/2

pdf.setDrawColor(200,0,0)

for(let i=0;i<pts.length-1;i++){

let x1=pts[i][0]*scale+offsetX
let y1=(maxy-pts[i][1])*scale+offsetY

let x2=pts[i+1][0]*scale+offsetX
let y2=(maxy-pts[i+1][1])*scale+offsetY

pdf.line(x1,y1,x2,y2)

let mx=(x1+x2)/2
let my=(y1+y2)/2

pdf.setFontSize(9)
pdf.text(lines[i].length.toFixed(2)+"m",mx,my)

}

let img=new Image()

img.onload=function(){

let logoWidth=100
let logoHeight=25

let logoX=pageWidth-logoWidth-8
let logoY=pageHeight-logoHeight-8

pdf.addImage(img,"PNG",logoX,logoY,logoWidth,logoHeight)

pdf.save("site-plan.pdf")

}

img.onerror=function(){
pdf.save("site-plan.pdf")
}

img.src="logos.png"

}

addLineRow()
addLineRow()
addLineRow()

</script>

</body>
</html>
