<!DOCTYPE html>
<html>

<head>

<title>Site Plan Designer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f3f5f7;
}

header{
background:#1e293b;
color:white;
padding:14px 20px;
font-size:18px;
font-weight:600;
}

#container{
display:flex;
height:calc(100vh - 52px);
}

.controls{
width:280px;
background:white;
padding:20px;
box-shadow:2px 0 8px rgba(0,0,0,0.08);
overflow:auto;
}

.controls h3{
margin-top:25px;
}

input{
width:60px;
padding:6px;
margin-right:4px;
border:1px solid #ddd;
border-radius:4px;
}

button{
margin-top:6px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:13px;
}

button.secondary{
background:#64748b;
}

button:hover{
opacity:0.9;
}

canvas{
background:white;
flex:1;
}

.line-list{
font-size:13px;
margin-top:10px;
}

.area{
margin-top:12px;
font-weight:600;
}

</style>

</head>

<body>

<header>
Site Plan Designer
</header>

<div id="container">

<div class="controls">

Length (m)<br>
<input id="length">

<br><br>

Angle (D M S)<br>

<input id="deg" placeholder="°">
<input id="min" placeholder="'">
<input id="sec" placeholder='"'>

<br>

<button onclick="addLine()">Add Line</button>

<h3>Tools</h3>

<button onclick="draw()">Draw</button>
<button onclick="rotateLot()">Rotate 90°</button>
<button onclick="rotateNorth()">Rotate North</button>
<button onclick="exportPDF()">Export A3</button>
<button class="secondary" onclick="clearLines()">Clear</button>

<h3>Lines</h3>

<div id="lines" class="line-list"></div>

<div id="area" class="area"></div>

</div>

<canvas id="canvas" width="1200" height="800"></canvas>

</div>

<script>

let lines=[]
let rotation=0
let northRotation=0
let points=[]
let draggingIndex=null

function dmsToDeg(d,m,s){
d=parseFloat(d)||0
m=parseFloat(m)||0
s=parseFloat(s)||0
return d+(m/60)+(s/3600)
}

function addLine(){

let length=parseFloat(document.getElementById("length").value)

let d=document.getElementById("deg").value
let m=document.getElementById("min").value
let s=document.getElementById("sec").value

let angle=dmsToDeg(d,m,s)

if(isNaN(length)) return

lines.push({length,angle})

updateLineList()

}

function updateLineList(){

let html=""

lines.forEach((l,i)=>{
html+=`Line ${i+1}: ${l.length}m @ ${l.angle.toFixed(2)}°<br>`
})

document.getElementById("lines").innerHTML=html

}

function calculatePoints(){

let pts=[[0,0]]

let angle=0
let x=0
let y=0

for(let l of lines){

angle+=l.angle*Math.PI/180

x+=l.length*Math.cos(angle)
y+=l.length*Math.sin(angle)

pts.push([x,y])

}

return pts

}

function rotatePoints(pts,rot){

let rad=rot*Math.PI/180

return pts.map(p=>[
p[0]*Math.cos(rad)-p[1]*Math.sin(rad),
p[0]*Math.sin(rad)+p[1]*Math.cos(rad)
])

}

function draw(){

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,canvas.width,canvas.height)

points=rotatePoints(calculatePoints(),rotation)

let xs=points.map(p=>p[0])
let ys=points.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)

let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let w=maxx-minx
let h=maxy-miny

let scale=Math.min(900/(w||1),600/(h||1))

let screen=[]

points.forEach(p=>{
let x=(p[0]-minx)*scale+150
let y=700-(p[1]-miny)*scale
screen.push([x,y])
})

ctx.beginPath()

screen.forEach((p,i)=>{
if(i===0) ctx.moveTo(p[0],p[1])
else ctx.lineTo(p[0],p[1])
})

ctx.stroke()

ctx.font="12px Arial"

for(let i=0;i<screen.length-1;i++){

let mx=(screen[i][0]+screen[i+1][0])/2
let my=(screen[i][1]+screen[i+1][1])/2

ctx.fillText(lines[i].length+"m",mx,my)

}

screen.forEach((p,i)=>{
ctx.beginPath()
ctx.arc(p[0],p[1],5,0,Math.PI*2)
ctx.fill()
})

drawNorthArrow(ctx)

let area=polygonArea(points)

document.getElementById("area").innerText="Area: "+area.toFixed(2)+" m²"

}

function drawNorthArrow(ctx){

let x=1050
let y=120

ctx.save()

ctx.translate(x,y)
ctx.rotate(northRotation*Math.PI/180)

ctx.beginPath()
ctx.moveTo(0,-30)
ctx.lineTo(10,10)
ctx.lineTo(-10,10)
ctx.closePath()
ctx.fill()

ctx.fillText("N",-4,-35)

ctx.restore()

}

function polygonArea(points){

let area=0

for(let i=0;i<points.length;i++){

let j=(i+1)%points.length

area+=points[i][0]*points[j][1]
area-=points[j][0]*points[i][1]

}

return Math.abs(area/2)

}

function rotateLot(){

rotation+=90
draw()

}

function rotateNorth(){

northRotation+=10
draw()

}

function clearLines(){

lines=[]
rotation=0

document.getElementById("lines").innerHTML=""
document.getElementById("area").innerText=""

let ctx=document.getElementById("canvas").getContext("2d")
ctx.clearRect(0,0,1200,800)

}

function exportPDF(){

const {jsPDF}=window.jspdf

let pdf=new jsPDF({
orientation:"portrait",
unit:"mm",
format:"a3"
})

let scale=10

let xs=points.map(p=>p[0])
let ys=points.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)

let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let lotWidth=(maxx-minx)*scale
let lotHeight=(maxy-miny)*scale

let offsetX=(297-lotWidth)/2-minx*scale
let offsetY=(420-lotHeight)/2-miny*scale

for(let i=0;i<points.length-1;i++){

let x1=points[i][0]*scale+offsetX
let y1=points[i][1]*scale+offsetY

let x2=points[i+1][0]*scale+offsetX
let y2=points[i+1][1]*scale+offsetY

pdf.line(x1,y1,x2,y2)

}

pdf.text("SITE PLAN",20,20)
pdf.text("Scale 1:100 @ A3",20,28)

pdf.addImage("logos.png","PNG",180,380,100,25)

pdf.save("site-plan.pdf")

}

let canvas=document.getElementById("canvas")

canvas.addEventListener("mousedown",e=>{

let rect=canvas.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

points.forEach((p,i)=>{

let sx=p[0]
let sy=p[1]

if(Math.hypot(x-sx,y-sy)<10){
draggingIndex=i
}

})

})

canvas.addEventListener("mouseup",()=>{
draggingIndex=null
})

canvas.addEventListener("mousemove",e=>{

if(draggingIndex===null) return

let rect=canvas.getBoundingClientRect()

points[draggingIndex][0]=e.clientX-rect.left
points[draggingIndex][1]=e.clientY-rect.top

draw()

})

</script>

</body>

</html>
