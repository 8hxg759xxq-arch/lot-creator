<!DOCTYPE html>
<html>
<head>

<title>Lot Site Plan Designer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f3f5f7;
}

header{
background:#1e293b;
color:white;
padding:14px 20px;
font-size:18px;
font-weight:600;
}

#container{
display:flex;
height:calc(100vh - 52px);
}

#panel{
width:380px;
background:white;
padding:20px;
box-shadow:2px 0 8px rgba(0,0,0,0.08);
overflow:auto;
}

canvas{
flex:1;
background:white;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
border-bottom:1px solid #eee;
padding:6px;
text-align:center;
}

input{
width:55px;
padding:4px;
border:1px solid #ddd;
border-radius:4px;
}

button{
margin-top:6px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
width:100%;
}

</style>
</head>

<body>

<header>Lot Site Plan Designer</header>

<div id="container">

<div id="panel">

<h3>Start Direction</h3>

<select id="startDirection" onchange="draw()">
<option value="0">East</option>
<option value="90">North</option>
<option value="180">West</option>
<option value="270">South</option>
</select>

<h3>Boundary Direction</h3>

<select id="directionMode" onchange="draw()">
<option value="cw">Clockwise</option>
<option value="ccw">Counter Clockwise</option>
</select>

<h3>Boundary Input</h3>

<table id="lineTable">
<tr>
<th>Length</th>
<th>°</th>
<th>'</th>
<th>"</th>
<th>Type</th>
<th>Vertical</th>
<th>Setbacks</th>
</tr>
</table>

<button onclick="addLineRow()">Add Line</button>

<h3>Export</h3>

<button onclick="exportPDF()">Generate PDF</button>

</div>

<canvas id="canvas" width="1200" height="800"></canvas>

</div>

<script>

let lines=[]
let rotation=0

function addLineRow(){

let row=document.getElementById("lineTable").insertRow()

row.innerHTML=`
<td><input oninput="draw()"></td>
<td><input oninput="draw()"></td>
<td><input oninput="draw()"></td>
<td><input oninput="draw()"></td>

<td>
<select onchange="draw()">
<option value="interior">Interior</option>
<option value="external">External</option>
</select>
</td>

<td>
<input type="checkbox" onchange="draw()">
</td>

<td>
<input type="checkbox" onchange="draw()">
</td>
`

}

function readLines(){

lines=[]

let rows=document.querySelectorAll("#lineTable tr")

rows.forEach((row,i)=>{

if(i===0)return

let inputs=row.querySelectorAll("input")

let length=parseFloat(inputs[0].value)

let d=parseFloat(inputs[1].value)||0
let m=parseFloat(inputs[2].value)||0
let s=parseFloat(inputs[3].value)||0

let angle=d+(m/60)+(s/3600)

let type=row.querySelector("select").value

let vertical=inputs[4].checked
let setback=inputs[5].checked

if(!isNaN(length)){
lines.push({length,angle,type,vertical,setback})
}

})

}

function calculatePoints(){

let pts=[[0,0]]

let direction=parseFloat(
document.getElementById("startDirection").value
)*Math.PI/180

let mode=document.getElementById("directionMode").value

let x=0
let y=0

lines.forEach(l=>{

x+=l.length*Math.cos(direction)
y+=l.length*Math.sin(direction)

pts.push([x,y])

let turn=l.type==="interior"
?(180-l.angle)*Math.PI/180
:l.angle*Math.PI/180

direction+=mode==="cw"?-turn:turn

})

return pts

}

function snapVertical(pts){

for(let i=0;i<lines.length;i++){

if(lines[i].vertical){

let p1=pts[i]
let p2=pts[i+1]

let dx=p2[0]-p1[0]
let dy=p2[1]-p1[1]

let angle=Math.atan2(dy,dx)*180/Math.PI

let rot1=90-angle
let rot2=-90-angle

rotation=Math.abs(rot1)<Math.abs(rot2)?rot1:rot2

break

}

}

}

function centroid(pts){

let cx=0
let cy=0

pts.forEach(p=>{
cx+=p[0]
cy+=p[1]
})

return [cx/pts.length,cy/pts.length]

}

function draw(){

readLines()

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,canvas.width,canvas.height)

let pts=calculatePoints()

if(pts.length<2)return

snapVertical(pts)

let rad=rotation*Math.PI/180

pts=pts.map(p=>[
p[0]*Math.cos(rad)-p[1]*Math.sin(rad),
p[0]*Math.sin(rad)+p[1]*Math.cos(rad)
])

let center=centroid(pts)

let xs=pts.map(p=>p[0])
let ys=pts.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)
let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let scale=Math.min(
900/(maxx-minx||1),
600/(maxy-miny||1)
)

function toScreen(p){
return[
(p[0]-minx)*scale+150,
(maxy-p[1])*scale+100
]
}

ctx.beginPath()

pts.forEach((p,i)=>{
let s=toScreen(p)
if(i===0)ctx.moveTo(s[0],s[1])
else ctx.lineTo(s[0],s[1])
})

ctx.lineWidth=2
ctx.stroke()

ctx.font="12px Arial"

for(let i=0;i<pts.length-1;i++){

let p1=pts[i]
let p2=pts[i+1]

let dx=p2[0]-p1[0]
let dy=p2[1]-p1[1]

let len=Math.sqrt(dx*dx+dy*dy)

let nx=-dy/len
let ny=dx/len

let midx=(p1[0]+p2[0])/2
let midy=(p1[1]+p2[1])/2

let vx=midx-center[0]
let vy=midy-center[1]

if(nx*vx+ny*vy<0){
nx*=-1
ny*=-1
}

if(lines[i].setback){

drawOffset(ctx,p1,p2,nx,ny,6,scale,toScreen,"blue",[10,6])
drawOffset(ctx,p1,p2,nx,ny,4.5,scale,toScreen,"green")
drawOffset(ctx,p1,p2,nx,ny,3,scale,toScreen,"red")
drawOffset(ctx,p1,p2,nx,ny,2,scale,toScreen,"yellow")

}

let s1=toScreen(p1)
let s2=toScreen(p2)

let mx=(s1[0]+s2[0])/2 + nx*25
let my=(s1[1]+s2[1])/2 + ny*25

ctx.fillText(lines[i].length.toFixed(2)+"m",mx,my)

}

}

function drawOffset(ctx,p1,p2,nx,ny,d,scale,toScreen,color,dash=[]){

let a=[p1[0]+nx*d,p1[1]+ny*d]
let b=[p2[0]+nx*d,p2[1]+ny*d]

let s1=toScreen(a)
let s2=toScreen(b)

ctx.strokeStyle=color
ctx.setLineDash(dash)

ctx.beginPath()
ctx.moveTo(s1[0],s1[1])
ctx.lineTo(s2[0],s2[1])
ctx.stroke()

ctx.setLineDash([])

}

function exportPDF(){

readLines()

const {jsPDF}=window.jspdf

let pdf=new jsPDF({
orientation:"portrait",
unit:"mm",
format:"a3"
})

let pts=calculatePoints()

snapVertical(pts)

let rad=rotation*Math.PI/180

pts=pts.map(p=>[
p[0]*Math.cos(rad)-p[1]*Math.sin(rad),
p[0]*Math.sin(rad)+p[1]*Math.cos(rad)
])

let xs=pts.map(p=>p[0])
let ys=pts.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)
let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let pageWidth=pdf.internal.pageSize.getWidth()
let pageHeight=pdf.internal.pageSize.getHeight()

let margin=25

let scale=Math.min(
(pageWidth-margin*2)/(maxx-minx),
(pageHeight-margin*2)/(maxy-miny)
)

let offsetX=(pageWidth-(maxx-minx)*scale)/2-minx*scale
let offsetY=(pageHeight-(maxy-miny)*scale)/2

pdf.setDrawColor(200,0,0)
pdf.setLineWidth(0.6)

for(let i=0;i<pts.length-1;i++){

let x1=pts[i][0]*scale+offsetX
let y1=(maxy-pts[i][1])*scale+offsetY

let x2=pts[i+1][0]*scale+offsetX
let y2=(maxy-pts[i+1][1])*scale+offsetY

pdf.line(x1,y1,x2,y2)

}

let img=new Image()

img.onload=function(){

pdf.addImage(img,"PNG",pageWidth-108,pageHeight-33,100,25)

pdf.save("site-plan.pdf")

}

img.src="logos.png"

}

addLineRow()
addLineRow()
addLineRow()

draw()

</script>

</body>
</html>
