<!DOCTYPE html>
<html>
<head>

<title>Lot Site Plan Designer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f5f7;
}

header{
background:#1e293b;
color:white;
padding:14px;
font-size:18px;
}

#container{
display:flex;
height:calc(100vh - 50px);
}

#panel{
width:300px;
min-width:220px;
max-width:700px;
background:white;
padding:15px;
overflow:auto;
box-shadow:2px 0 8px rgba(0,0,0,0.08);
}

#divider{
width:6px;
background:#ddd;
cursor:col-resize;
}

canvas{
flex:1;
background:white;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th,td{
border-bottom:1px solid #eee;
padding:4px;
text-align:center;
}

input{
width:36px;
}

button{
margin-top:6px;
padding:6px;
width:100%;
}

</style>

</head>

<body>

<header>Lot Site Plan Designer</header>

<div id="container">

<div id="panel">

<table id="lineTable">

<tr>
<th>L</th>
<th>°</th>
<th>'</th>
<th>"</th>
<th>V</th>
<th>S</th>
<th>1</th>
<th>1.5</th>
</tr>

</table>

<button onclick="addLineRow()">Add Line</button>

<button onclick="exportPDF()">Export PDF</button>

</div>

<div id="divider"></div>

<canvas id="canvas" width="1200" height="800"></canvas>

</div>

<script>

let lines=[]
let rotation=0

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

function addLineRow(){

let row=lineTable.insertRow()

row.innerHTML=`
<td><input oninput="draw()"></td>
<td><input oninput="draw()"></td>
<td><input oninput="draw()"></td>
<td><input oninput="draw()"></td>
<td><input type="checkbox" onchange="draw()"></td>
<td><input type="checkbox" onchange="draw()"></td>
<td><input type="checkbox" onchange="draw()"></td>
<td><input type="checkbox" onchange="draw()"></td>
`

}

function readLines(){

lines=[]

let rows=document.querySelectorAll("#lineTable tr")

rows.forEach((row,i)=>{

if(i===0)return

let inputs=row.querySelectorAll("input")

let length=parseFloat(inputs[0].value)

if(isNaN(length))return

let d=parseFloat(inputs[1].value)||0
let m=parseFloat(inputs[2].value)||0
let s=parseFloat(inputs[3].value)||0

let angle=(d+(m/60)+(s/3600))*Math.PI/180

lines.push({
length:length,
angle:angle,
vertical:inputs[4].checked,
setback:inputs[5].checked,
side1:inputs[6].checked,
side15:inputs[7].checked
})

})

}

function calculatePoints(){

let pts=[[0,0]]

let direction=0

let x=0
let y=0

lines.forEach(l=>{

x+=l.length*Math.cos(direction)
y+=l.length*Math.sin(direction)

pts.push([x,y])

direction-=l.angle

})

return pts

}

function centroid(pts){

let cx=0
let cy=0

pts.forEach(p=>{
cx+=p[0]
cy+=p[1]
})

return[cx/pts.length,cy/pts.length]

}

function draw(){

readLines()

ctx.clearRect(0,0,canvas.width,canvas.height)

let pts=calculatePoints()

if(pts.length<2)return

let center=centroid(pts)

let xs=pts.map(p=>p[0])
let ys=pts.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)
let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let pad=80

let scale=Math.min(
(canvas.width-pad)/(maxx-minx||1),
(canvas.height-pad)/(maxy-miny||1)
)

function toScreen(p){

return[
(p[0]-minx)*scale+pad/2,
(maxy-p[1])*scale+pad/2
]

}

ctx.beginPath()

pts.forEach((p,i)=>{

let s=toScreen(p)

if(i==0)ctx.moveTo(s[0],s[1])
else ctx.lineTo(s[0],s[1])

})

ctx.stroke()

for(let i=0;i<pts.length-1;i++){

let p1=pts[i]
let p2=pts[i+1]

let dx=p2[0]-p1[0]
let dy=p2[1]-p1[1]

let len=Math.sqrt(dx*dx+dy*dy)

let nx=-dy/len
let ny=dx/len

let mid=[(p1[0]+p2[0])/2,(p1[1]+p2[1])/2]

let vx=center[0]-mid[0]
let vy=center[1]-mid[1]

if(nx*vx+ny*vy<0){
nx*=-1
ny*=-1
}

function drawSetback(d,color){

let a=[p1[0]+nx*d,p1[1]+ny*d]
let b=[p2[0]+nx*d,p2[1]+ny*d]

let s1=toScreen(a)
let s2=toScreen(b)

ctx.strokeStyle=color
ctx.setLineDash([6,6])

ctx.beginPath()
ctx.moveTo(s1[0],s1[1])
ctx.lineTo(s2[0],s2[1])
ctx.stroke()

ctx.setLineDash([])

}

if(lines[i].setback){

drawSetback(6,"rgba(0,0,255,0.3)")
drawSetback(4.5,"rgba(0,200,0,0.3)")
drawSetback(3,"rgba(255,0,0,0.3)")
drawSetback(2,"rgba(255,200,0,0.3)")

}

if(lines[i].side1) drawSetback(1,"rgba(120,120,120,0.4)")
if(lines[i].side15) drawSetback(1.5,"rgba(120,120,120,0.4)")

/* dimensions outside */

let s1=toScreen(p1)
let s2=toScreen(p2)

let mx=(s1[0]+s2[0])/2 - nx*25
let my=(s1[1]+s2[1])/2 - ny*25

ctx.fillText(lines[i].length.toFixed(2)+"m",mx,my)

}

}

function exportPDF(){

readLines()

const {jsPDF}=window.jspdf

let pdf=new jsPDF("portrait","mm","a3")

let pts=calculatePoints()

let center=centroid(pts)

let xs=pts.map(p=>p[0])
let ys=pts.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)
let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let width=maxx-minx
let height=maxy-miny

let mmPerMeter=10   // 1:100 scale

let pageWidth=pdf.internal.pageSize.getWidth()
let pageHeight=pdf.internal.pageSize.getHeight()

let offsetX=(pageWidth-width*mmPerMeter)/2 - minx*mmPerMeter
let offsetY=(pageHeight-height*mmPerMeter)/2

for(let i=0;i<pts.length-1;i++){

let p1=pts[i]
let p2=pts[i+1]

let x1=p1[0]*mmPerMeter+offsetX
let y1=(maxy-p1[1])*mmPerMeter+offsetY

let x2=p2[0]*mmPerMeter+offsetX
let y2=(maxy-p2[1])*mmPerMeter+offsetY

pdf.setDrawColor(200,0,0)
pdf.line(x1,y1,x2,y2)

/* dimension */

let mx=(x1+x2)/2
let my=(y1+y2)/2

pdf.setFontSize(9)
pdf.text(lines[i].length.toFixed(2)+"m",mx,my)

}

pdf.save("site-plan.pdf")

}

addLineRow()
addLineRow()
addLineRow()

draw()

/* panel resize */

const divider=document.getElementById("divider")
const panel=document.getElementById("panel")

let resizing=false

divider.addEventListener("mousedown",()=>resizing=true)

document.addEventListener("mousemove",e=>{
if(!resizing)return
panel.style.width=e.clientX+"px"
})

document.addEventListener("mouseup",()=>resizing=false)

</script>

</body>
</html>
