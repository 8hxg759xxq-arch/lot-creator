<!DOCTYPE html>
<html>
<head>

<title>Lot Site Plan Designer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f3f5f7;
}

header{
background:#1e293b;
color:white;
padding:14px 20px;
font-size:18px;
font-weight:600;
}

#container{
display:flex;
height:calc(100vh - 52px);
}

.controls{
width:380px;
min-width:260px;
max-width:700px;
background:white;
padding:20px;
box-shadow:2px 0 8px rgba(0,0,0,0.08);
overflow:auto;
}

#divider{
width:6px;
cursor:col-resize;
background:#e2e8f0;
}

#divider:hover{
background:#94a3b8;
}

canvas{
background:white;
flex:1;
cursor:grab;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
border-bottom:1px solid #eee;
padding:6px;
text-align:center;
}

input{
width:55px;
padding:4px;
border:1px solid #ddd;
border-radius:4px;
}

button{
margin-top:6px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<header>Lot Site Plan Designer</header>

<div id="container">

<div class="controls" id="panel">

<h3>Start Direction</h3>

<select id="startDirection">
<option value="0">East</option>
<option value="90">North</option>
<option value="180">West</option>
<option value="270">South</option>
</select>

<h3>Boundary Direction</h3>

<select id="directionMode">
<option value="cw">Clockwise</option>
<option value="ccw">Counter Clockwise</option>
</select>

<h3>Boundary Input</h3>

<table id="lineTable">
<tr>
<th>Length</th>
<th>°</th>
<th>'</th>
<th>"</th>
<th>Type</th>
<th>Vertical</th>
</tr>
</table>

<button onclick="addLineRow()">Add Line</button>
<button onclick="generateLot()">Generate Lot</button>

<h3>Tools</h3>

<button onclick="rotateLot()">Rotate</button>
<button onclick="flipLot()">Flip</button>
<button onclick="clearLot()">Clear</button>

<h3>Export</h3>

<button onclick="exportPDF()">Generate PDF</button>

</div>

<div id="divider"></div>

<canvas id="canvas" width="1200" height="800"></canvas>

</div>

<script>

let lines=[]
let rotation=0
let flip=1

let zoom=1
let panX=0
let panY=0
let dragging=false
let lastX=0
let lastY=0

function addLineRow(){

let table=document.getElementById("lineTable")
let row=table.insertRow()

row.innerHTML=`
<td><input></td>
<td><input></td>
<td><input></td>
<td><input></td>
<td>
<select>
<option value="interior">Interior</option>
<option value="external">External</option>
</select>
</td>
<td><input type="checkbox"></td>
`

}

function generateLot(){

lines=[]

let rows=document.querySelectorAll("#lineTable tr")

rows.forEach((row,i)=>{

if(i===0)return

let inputs=row.querySelectorAll("input")
let select=row.querySelector("select")

let length=parseFloat(inputs[0].value)

let d=parseFloat(inputs[1].value)||0
let m=parseFloat(inputs[2].value)||0
let s=parseFloat(inputs[3].value)||0

let angle=d+(m/60)+(s/3600)

let vertical=inputs[4].checked

let type=select.value

if(!isNaN(length)){

lines.push({length,angle,type,vertical})

}

})

draw()

}

function calculatePoints(){

let pts=[[0,0]]

let direction=parseFloat(
document.getElementById("startDirection").value
)*Math.PI/180

let mode=document.getElementById("directionMode").value

let x=0
let y=0

lines.forEach(l=>{

x+=l.length*Math.cos(direction)
y+=l.length*Math.sin(direction)

pts.push([x,y])

let turn

if(l.type==="interior"){
turn=(180-l.angle)*Math.PI/180
}else{
turn=l.angle*Math.PI/180
}

if(mode==="cw") direction-=turn
else direction+=turn

})

return pts

}

function applyVerticalRotation(pts){

let index=lines.findIndex(l=>l.vertical)

if(index===-1)return pts

let p1=pts[index]
let p2=pts[index+1]

let dx=p2[0]-p1[0]
let dy=p2[1]-p1[1]

let angle=Math.atan2(dy,dx)

let rotate=Math.PI/2-angle

return pts.map(p=>{

let x=p[0]
let y=p[1]

return[
x*Math.cos(rotate)-y*Math.sin(rotate),
x*Math.sin(rotate)+y*Math.cos(rotate)
]

})

}

function draw(){

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,canvas.width,canvas.height)

let pts=applyVerticalRotation(calculatePoints())

pts=pts.map(p=>[p[0]*flip,p[1]])

let rad=rotation*Math.PI/180

pts=pts.map(p=>[
p[0]*Math.cos(rad)-p[1]*Math.sin(rad),
p[0]*Math.sin(rad)+p[1]*Math.cos(rad)
])

let xs=pts.map(p=>p[0])
let ys=pts.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)
let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let scale=Math.min(900/(maxx-minx||1),600/(maxy-miny||1))*zoom

ctx.save()
ctx.translate(panX,panY)

let screen=[]

pts.forEach(p=>{

let x=(p[0]-minx)*scale+150
let y=700-(p[1]-miny)*scale

screen.push([x,y])

})

ctx.beginPath()

screen.forEach((p,i)=>{
if(i===0)ctx.moveTo(p[0],p[1])
else ctx.lineTo(p[0],p[1])
})

ctx.stroke()

ctx.restore()

}

function rotateLot(){
rotation+=90
draw()
}

function flipLot(){
flip*=-1
draw()
}

function clearLot(){

lines=[]
rotation=0
flip=1

let table=document.getElementById("lineTable")

while(table.rows.length>1){
table.deleteRow(1)
}

addLineRow()
addLineRow()
addLineRow()

let canvas=document.getElementById("canvas")
canvas.getContext("2d").clearRect(0,0,1200,800)

}

function exportPDF(){

generateLot()

const {jsPDF}=window.jspdf

let pdf=new jsPDF({
orientation:"portrait",
unit:"mm",
format:"a3"
})

let pts=applyVerticalRotation(calculatePoints())

let pageWidth=pdf.internal.pageSize.getWidth()
let pageHeight=pdf.internal.pageSize.getHeight()

pdf.rect(8,8,pageWidth-16,pageHeight-16)

let xs=pts.map(p=>p[0])
let ys=pts.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)
let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let scale=10

let offsetX=(pageWidth-(maxx-minx)*scale)/2-minx*scale
let offsetY=(pageHeight-(maxy-miny)*scale)/2

pdf.setDrawColor(200,0,0)

for(let i=0;i<pts.length-1;i++){

let x1=pts[i][0]*scale+offsetX
let y1=(maxy-pts[i][1])*scale+offsetY

let x2=pts[i+1][0]*scale+offsetX
let y2=(maxy-pts[i+1][1])*scale+offsetY

pdf.line(x1,y1,x2,y2)

}

pdf.text("Scale 1:100 @ A3",20,20)

let img=new Image()

img.onload=function(){

pdf.addImage(img,"PNG",pageWidth-108,pageHeight-33,100,25)

pdf.save("site-plan.pdf")

}

img.onerror=function(){
pdf.save("site-plan.pdf")
}

img.src="logos.png"

}

/* panel resize */

const divider=document.getElementById("divider")
const panel=document.getElementById("panel")

let resizing=false

divider.addEventListener("mousedown",()=>resizing=true)

document.addEventListener("mousemove",e=>{
if(!resizing)return
panel.style.width=e.clientX+"px"
})

document.addEventListener("mouseup",()=>resizing=false)

/* zoom */

canvas.addEventListener("wheel",e=>{

e.preventDefault()

if(e.deltaY<0) zoom*=1.1
else zoom/=1.1

draw()

})

/* pan */

canvas.addEventListener("mousedown",e=>{
dragging=true
lastX=e.clientX
lastY=e.clientY
})

canvas.addEventListener("mousemove",e=>{

if(!dragging)return

panX+=e.clientX-lastX
panY+=e.clientY-lastY

lastX=e.clientX
lastY=e.clientY

draw()

})

canvas.addEventListener("mouseup",()=>dragging=false)

addLineRow()
addLineRow()
addLineRow()

</script>

</body>
</html>
