<!DOCTYPE html>
<html>
<head>

<title>Lot Site Plan Designer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#eef2f6;
}

header{
background:#1e293b;
color:white;
padding:16px 20px;
font-size:18px;
font-weight:600;
}

#container{
display:flex;
height:calc(100vh - 56px);
}

#panel{
width:340px;
min-width:240px;
max-width:700px;
background:white;
padding:18px;
box-shadow:3px 0 10px rgba(0,0,0,0.08);
overflow:auto;
}

#divider{
width:6px;
cursor:col-resize;
background:#d7dde5;
}

canvas{
flex:1;
background:white;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th{
background:#f1f5f9;
padding:6px;
}

td{
padding:4px;
border-bottom:1px solid #eee;
text-align:center;
}

input{
width:42px;
border:1px solid #cbd5e1;
border-radius:4px;
}

select{
border:1px solid #cbd5e1;
border-radius:4px;
font-size:12px;
}

button{
margin-top:6px;
padding:8px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
width:100%;
}

button.secondary{
background:#64748b;
}

</style>

</head>

<body>

<header>Lot Site Plan Designer</header>

<div id="container">

<div id="panel">

<h3>Lot Boundaries</h3>

<table id="lineTable">

<tr>
<th>L</th>
<th>°</th>
<th>'</th>
<th>"</th>
<th>Angle</th>
<th>V</th>
<th>S</th>
<th>1</th>
<th>1.5</th>
</tr>

</table>

<button onclick="addLineRow()">Add Boundary</button>
<button onclick="autoCloseLot()">Auto Close Lot</button>
<button class="secondary" onclick="clearLot()">Clear</button>

<h3>Export</h3>

<button onclick="exportPDF()">Generate A3 PDF</button>

</div>

<div id="divider"></div>

<canvas id="canvas" width="1200" height="800"></canvas>

</div>

<script>

let lines=[]
let rotation=0

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

function addLineRow(){

let row=lineTable.insertRow()

row.innerHTML=`
<td><input oninput="draw()"></td>
<td><input oninput="draw()"></td>
<td><input oninput="draw()"></td>
<td><input oninput="draw()"></td>

<td>
<select onchange="draw()">
<option value="internal">Internal</option>
<option value="external">External</option>
</select>
</td>

<td><input type="checkbox" onchange="draw()"></td>
<td><input type="checkbox" onchange="draw()"></td>
<td><input type="checkbox" onchange="draw()"></td>
<td><input type="checkbox" onchange="draw()"></td>
`

}

function clearLot(){

while(lineTable.rows.length>1){
lineTable.deleteRow(1)
}

addLineRow()
addLineRow()
addLineRow()

draw()

}

function readLines(){

lines=[]

let rows=document.querySelectorAll("#lineTable tr")

rows.forEach((row,i)=>{

if(i===0)return

let inputs=row.querySelectorAll("input")
let type=row.querySelector("select").value

let length=parseFloat(inputs[0].value)

if(isNaN(length))return

let d=parseFloat(inputs[1].value)||0
let m=parseFloat(inputs[2].value)||0
let s=parseFloat(inputs[3].value)||0

let angle=(d+(m/60)+(s/3600))*Math.PI/180

lines.push({
length,
angle,
type,
vertical:inputs[4].checked,
setback:inputs[5].checked,
side1:inputs[6].checked,
side15:inputs[7].checked
})

})

}

function calculatePoints(){

let pts=[[0,0]]

let direction=0
let x=0
let y=0

lines.forEach(l=>{

x+=l.length*Math.cos(direction)
y+=l.length*Math.sin(direction)

pts.push([x,y])

let turn = l.type==="internal"
? Math.PI-l.angle
: l.angle

direction -= turn

})

return pts

}

function getRotation(pts){

for(let i=0;i<lines.length;i++){

if(lines[i].vertical){

let p1=pts[i]
let p2=pts[i+1]

let ang=Math.atan2(p2[1]-p1[1],p2[0]-p1[0])

let r1=(Math.PI/2)-ang
let r2=(-Math.PI/2)-ang

return Math.abs(r1)<Math.abs(r2)?r1:r2

}

}

return 0

}

function rotatePts(pts,rot){

return pts.map(p=>[
p[0]*Math.cos(rot)-p[1]*Math.sin(rot),
p[0]*Math.sin(rot)+p[1]*Math.cos(rot)
])

}

function draw(){

readLines()

ctx.clearRect(0,0,canvas.width,canvas.height)

let pts=calculatePoints()

rotation=getRotation(pts)

pts=rotatePts(pts,rotation)

if(pts.length<2)return

let xs=pts.map(p=>p[0])
let ys=pts.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)
let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let pad=80

let scale=Math.min(
(canvas.width-pad)/(maxx-minx||1),
(canvas.height-pad)/(maxy-miny||1)
)

function toScreen(p){
return[
(p[0]-minx)*scale+pad/2,
(maxy-p[1])*scale+pad/2
]
}

ctx.beginPath()

pts.forEach((p,i)=>{
let s=toScreen(p)
if(i===0)ctx.moveTo(s[0],s[1])
else ctx.lineTo(s[0],s[1])
})

ctx.stroke()

for(let i=0;i<pts.length-1;i++){

let p1=pts[i]
let p2=pts[i+1]

let dx=p2[0]-p1[0]
let dy=p2[1]-p1[1]

let len=Math.sqrt(dx*dx+dy*dy)

let nx=-dy/len
let ny=dx/len

let s1=toScreen(p1)
let s2=toScreen(p2)

let mx=(s1[0]+s2[0])/2 + nx*25
let my=(s1[1]+s2[1])/2 + ny*25

ctx.fillText(lines[i].length.toFixed(2)+"m",mx,my)

}

}

function autoCloseLot(){

readLines()

let pts=calculatePoints()

let last=pts[pts.length-1]

let dx=-last[0]
let dy=-last[1]

let length=Math.sqrt(dx*dx+dy*dy)

let angle=Math.atan2(dy,dx)

let deg=Math.abs(angle*180/Math.PI)

let row=lineTable.insertRow()

row.innerHTML=`
<td><input value="${length.toFixed(2)}"></td>
<td><input value="${Math.floor(deg)}"></td>
<td><input value="0"></td>
<td><input value="0"></td>

<td>
<select>
<option value="internal">Internal</option>
<option value="external">External</option>
</select>
</td>

<td><input type="checkbox"></td>
<td><input type="checkbox"></td>
<td><input type="checkbox"></td>
<td><input type="checkbox"></td>
`

draw()

}

function exportPDF(){

readLines()

const {jsPDF}=window.jspdf

let pdf=new jsPDF("portrait","mm","a3")

let pts=calculatePoints()

rotation=getRotation(pts)

pts=rotatePts(pts,rotation)

let xs=pts.map(p=>p[0])
let ys=pts.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)
let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let mmPerMeter=10

let pageWidth=pdf.internal.pageSize.getWidth()
let pageHeight=pdf.internal.pageSize.getHeight()

let offsetX=(pageWidth-(maxx-minx)*mmPerMeter)/2-minx*mmPerMeter
let offsetY=(pageHeight-(maxy-miny)*mmPerMeter)/2

pdf.setDrawColor(200,0,0)

for(let i=0;i<pts.length-1;i++){

let p1=pts[i]
let p2=pts[i+1]

pdf.line(
p1[0]*mmPerMeter+offsetX,
(maxy-p1[1])*mmPerMeter+offsetY,
p2[0]*mmPerMeter+offsetX,
(maxy-p2[1])*mmPerMeter+offsetY
)

let mx=(p1[0]+p2[0])/2
let my=(p1[1]+p2[1])/2

pdf.text(
lines[i].length.toFixed(2)+"m",
mx*mmPerMeter+offsetX,
(maxy-my)*mmPerMeter+offsetY
)

}

pdf.save("site-plan.pdf")

}

addLineRow()
addLineRow()
addLineRow()

draw()

</script>

</body>
</html>
