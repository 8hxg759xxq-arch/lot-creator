<!DOCTYPE html>
<html>

<head>

<title>Site Plan Designer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f3f5f7;
}

header{
background:#1e293b;
color:white;
padding:14px 20px;
font-size:18px;
font-weight:600;
}

#container{
display:flex;
height:calc(100vh - 52px);
}

.controls{
width:360px;
background:white;
padding:20px;
box-shadow:2px 0 8px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
border-bottom:1px solid #eee;
padding:6px;
text-align:center;
}

input{
width:60px;
padding:4px;
border:1px solid #ddd;
border-radius:4px;
}

button{
margin-top:10px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:13px;
}

button.secondary{
background:#64748b;
}

canvas{
background:white;
flex:1;
cursor:pointer;
}

.area{
margin-top:15px;
font-weight:600;
}

</style>

</head>

<body>

<header>
Site Plan Designer
</header>

<div id="container">

<div class="controls">

<h3>Boundary Input (Internal Angles)</h3>

<table id="lineTable">

<tr>
<th>Length</th>
<th>°</th>
<th>'</th>
<th>"</th>
</tr>

<tr>
<td><input></td>
<td><input></td>
<td><input></td>
<td><input></td>
</tr>

</table>

<button onclick="addLineRow()">Add Line</button>

<button onclick="generateLot()">Generate Lot</button>

<h3>Tools</h3>

<button onclick="rotateLot()">Rotate Lot</button>
<button onclick="flipLot()">Flip Lot</button>
<button onclick="rotateNorth()">Rotate North</button>
<button onclick="exportPDF()">Export A3</button>
<button class="secondary" onclick="clearAll()">Clear</button>

<div id="area" class="area"></div>

</div>

<canvas id="canvas" width="1200" height="800"></canvas>

</div>

<script>

let lines=[]
let points=[]
let rotation=0
let northRotation=0
let flipX=1
let draggingPoint=null

function addLineRow(){

let table=document.getElementById("lineTable")
let row=table.insertRow()

for(let i=0;i<4;i++){

let cell=row.insertCell()
let input=document.createElement("input")

cell.appendChild(input)

}

}

function generateLot(){

lines=[]

let rows=document.querySelectorAll("#lineTable tr")

rows.forEach((row,i)=>{

if(i===0)return

let cells=row.querySelectorAll("input")

let length=parseFloat(cells[0].value)

let d=parseFloat(cells[1].value)||0
let m=parseFloat(cells[2].value)||0
let s=parseFloat(cells[3].value)||0

let angle=d+(m/60)+(s/3600)

lines.push({length,angle})

})

draw()

}

function calculatePoints(){

let pts=[[0,0]]

let angle=0
let x=0
let y=0

lines.forEach((l,i)=>{

let turnAngle=180-l.angle
angle+=turnAngle*Math.PI/180

if(!isNaN(l.length)){

x+=l.length*Math.cos(angle)
y+=l.length*Math.sin(angle)

pts.push([x,y])

}else{

let last=pts[pts.length-1]

let dx=0-last[0]
let dy=0-last[1]

pts.push([0,0])

lines[i].length=Math.sqrt(dx*dx+dy*dy)

}

})

return pts

}

function transformPoints(pts){

let rad=rotation*Math.PI/180

return pts.map(p=>{

let x=p[0]*flipX
let y=p[1]

return[
x*Math.cos(rad)-y*Math.sin(rad),
x*Math.sin(rad)+y*Math.cos(rad)
]

})

}

function draw(){

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,canvas.width,canvas.height)

points=transformPoints(calculatePoints())

let xs=points.map(p=>p[0])
let ys=points.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)
let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let w=maxx-minx
let h=maxy-miny

let scale=Math.min(900/(w||1),600/(h||1))

let screen=[]

points.forEach(p=>{

let x=(p[0]-minx)*scale+150
let y=700-(p[1]-miny)*scale

screen.push([x,y])

})

ctx.beginPath()

screen.forEach((p,i)=>{
if(i===0)ctx.moveTo(p[0],p[1])
else ctx.lineTo(p[0],p[1])
})

ctx.stroke()

ctx.font="12px Arial"

for(let i=0;i<screen.length-1;i++){

let mx=(screen[i][0]+screen[i+1][0])/2
let my=(screen[i][1]+screen[i+1][1])/2

ctx.fillText(lines[i].length.toFixed(2)+"m",mx,my)

}

screen.forEach((p,i)=>{

ctx.beginPath()
ctx.arc(p[0],p[1],5,0,Math.PI*2)
ctx.fill()

})

drawNorth(ctx)

let area=polygonArea(points)

document.getElementById("area").innerText="Area: "+area.toFixed(2)+" m²"

}

function drawNorth(ctx){

ctx.save()

ctx.translate(1050,120)
ctx.rotate(northRotation*Math.PI/180)

ctx.beginPath()
ctx.moveTo(0,-30)
ctx.lineTo(10,10)
ctx.lineTo(-10,10)
ctx.closePath()

ctx.fill()

ctx.fillText("N",-4,-35)

ctx.restore()

}

function rotateLot(){

rotation+=90
draw()

}

function flipLot(){

flipX*=-1
draw()

}

function rotateNorth(){

northRotation+=10
draw()

}

function polygonArea(points){

let area=0

for(let i=0;i<points.length;i++){

let j=(i+1)%points.length

area+=points[i][0]*points[j][1]
area-=points[j][0]*points[i][1]

}

return Math.abs(area/2)

}

function exportPDF(){

const {jsPDF}=window.jspdf

let pdf=new jsPDF({
orientation:"portrait",
unit:"mm",
format:"a3"
})

let scale=10

let xs=points.map(p=>p[0])
let ys=points.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)
let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let lotWidth=(maxx-minx)*scale
let lotHeight=(maxy-miny)*scale

let offsetX=(297-lotWidth)/2-minx*scale
let offsetY=(420-lotHeight)/2

for(let i=0;i<points.length-1;i++){

let x1=points[i][0]*scale+offsetX
let y1=(maxy-points[i][1])*scale+offsetY

let x2=points[i+1][0]*scale+offsetX
let y2=(maxy-points[i+1][1])*scale+offsetY

pdf.line(x1,y1,x2,y2)

}

pdf.text("SITE PLAN",20,20)
pdf.text("Scale 1:100 @ A3",20,28)

let pageWidth=pdf.internal.pageSize.getWidth()
let pageHeight=pdf.internal.pageSize.getHeight()

let logoWidth=100
let logoHeight=25

let logoX=pageWidth-logoWidth-8
let logoY=pageHeight-logoHeight-8

pdf.addImage("logos.png","PNG",logoX,logoY,logoWidth,logoHeight)

pdf.save("site-plan.pdf")

}

function clearAll(){

lines=[]
points=[]
rotation=0
flipX=1

document.getElementById("area").innerText=""

let ctx=document.getElementById("canvas").getContext("2d")
ctx.clearRect(0,0,1200,800)

}

</script>

</body>
</html>
