<!DOCTYPE html>
<html>
<head>

<title>Lot Site Plan Designer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f3f5f7;
}

header{
background:#1e293b;
color:white;
padding:14px 20px;
font-size:18px;
font-weight:600;
}

#container{
display:flex;
height:calc(100vh - 52px);
}

#panel{
width:380px;
min-width:260px;
max-width:700px;
background:white;
padding:20px;
box-shadow:2px 0 8px rgba(0,0,0,0.08);
overflow:auto;
}

#divider{
width:6px;
cursor:col-resize;
background:#e2e8f0;
}

canvas{
flex:1;
background:white;
cursor:grab;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
border-bottom:1px solid #eee;
padding:6px;
text-align:center;
}

input{
width:55px;
padding:4px;
border:1px solid #ddd;
border-radius:4px;
}

button{
margin-top:6px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<header>Lot Site Plan Designer</header>

<div id="container">

<div id="panel">

<h3>Start Direction</h3>

<select id="startDirection">
<option value="0">East</option>
<option value="90">North</option>
<option value="180">West</option>
<option value="270">South</option>
</select>

<h3>Boundary Direction</h3>

<select id="directionMode">
<option value="cw">Clockwise</option>
<option value="ccw">Counter Clockwise</option>
</select>

<h3>Boundary Input</h3>

<table id="lineTable">
<tr>
<th>Length</th>
<th>°</th>
<th>'</th>
<th>"</th>
<th>Type</th>
<th>Vertical</th>
</tr>
</table>

<button onclick="addLineRow()">Add Line</button>
<button onclick="generateLot()">Generate Lot</button>
<button onclick="autoCloseLot()">Auto Close Lot</button>

<h3>Tools</h3>

<button onclick="rotateLot()">Rotate</button>
<button onclick="flipLot()">Flip</button>
<button onclick="snapCenter()">Snap To Center</button>
<button onclick="clearLot()">Clear</button>

<h3>Export</h3>

<button onclick="exportPDF()">Generate PDF</button>

</div>

<div id="divider"></div>

<canvas id="canvas" width="1200" height="800"></canvas>

</div>

<script>

let lines=[]
let zoom=1
let panX=0
let panY=0
let rotation=0
let flip=1

function addLineRow(){

let row=document.getElementById("lineTable").insertRow()

row.innerHTML=`
<td><input></td>
<td><input></td>
<td><input></td>
<td><input></td>
<td>
<select>
<option value="interior">Interior</option>
<option value="external">External</option>
</select>
</td>
<td><input type="checkbox"></td>
`

}

function readLines(){

lines=[]

let rows=document.querySelectorAll("#lineTable tr")

rows.forEach((row,i)=>{

if(i===0)return

let inputs=row.querySelectorAll("input")
let type=row.querySelector("select").value
let vertical=inputs[4].checked

let length=parseFloat(inputs[0].value)

let d=parseFloat(inputs[1].value)||0
let m=parseFloat(inputs[2].value)||0
let s=parseFloat(inputs[3].value)||0

let angle=d+(m/60)+(s/3600)

if(!isNaN(length)){
lines.push({length,angle,type,vertical})
}

})

}

function calculatePoints(){

let pts=[[0,0]]

let direction=parseFloat(
document.getElementById("startDirection").value
)*Math.PI/180

let mode=document.getElementById("directionMode").value

let x=0
let y=0

lines.forEach(l=>{

x+=l.length*Math.cos(direction)
y+=l.length*Math.sin(direction)

pts.push([x,y])

let turn=l.type==="interior"
?(180-l.angle)*Math.PI/180
:l.angle*Math.PI/180

direction+=mode==="cw"?-turn:turn

})

return pts

}

function autoVerticalRotation(pts){

for(let i=0;i<lines.length;i++){

if(lines[i].vertical){

let p1=pts[i]
let p2=pts[i+1]

let dx=p2[0]-p1[0]
let dy=p2[1]-p1[1]

let angle=Math.atan2(dy,dx)*180/Math.PI

rotation=90-angle

break

}

}

}

function generateLot(){

readLines()

let pts=calculatePoints()

autoVerticalRotation(pts)

draw()

}

function autoCloseLot(){

readLines()

let pts=calculatePoints()

let last=pts[pts.length-1]

let dx=-last[0]
let dy=-last[1]

let length=Math.sqrt(dx*dx+dy*dy)

alert("Closing boundary = "+length.toFixed(2)+" m")

}

function draw(){

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,canvas.width,canvas.height)

let pts=calculatePoints()

pts=pts.map(p=>[p[0]*flip,p[1]])

let rad=rotation*Math.PI/180

pts=pts.map(p=>[
p[0]*Math.cos(rad)-p[1]*Math.sin(rad),
p[0]*Math.sin(rad)+p[1]*Math.cos(rad)
])

let xs=pts.map(p=>p[0])
let ys=pts.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)
let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let scale=Math.min(
900/(maxx-minx||1),
600/(maxy-miny||1)
)*zoom

ctx.save()

ctx.translate(panX,panY)

let screen=[]

pts.forEach(p=>{

let x=(p[0]-minx)*scale+150
let y=(maxy-p[1])*scale+100

screen.push([x,y])

})

ctx.beginPath()

screen.forEach((p,i)=>{
if(i===0)ctx.moveTo(p[0],p[1])
else ctx.lineTo(p[0],p[1])
})

ctx.lineWidth=2
ctx.stroke()

ctx.font="12px Arial"

for(let i=0;i<screen.length-1;i++){

let p1=screen[i]
let p2=screen[i+1]

let dx=p2[0]-p1[0]
let dy=p2[1]-p1[1]
let len=Math.sqrt(dx*dx+dy*dy)

let nx=-dy/len
let ny=dx/len

let mx=(p1[0]+p2[0])/2 + nx*15
let my=(p1[1]+p2[1])/2 + ny*15

ctx.fillText(lines[i].length.toFixed(2)+"m",mx,my)

}

ctx.restore()

}

function rotateLot(){ rotation+=90; draw() }
function flipLot(){ flip*=-1; draw() }

function snapCenter(){

zoom=1
panX=0
panY=0
draw()

}

function clearLot(){

lines=[]
zoom=1
panX=0
panY=0
rotation=0
flip=1

let table=document.getElementById("lineTable")

while(table.rows.length>1){
table.deleteRow(1)
}

addLineRow()
addLineRow()
addLineRow()

let ctx=document.getElementById("canvas").getContext("2d")
ctx.clearRect(0,0,1200,800)

}

canvas.addEventListener("wheel",e=>{
e.preventDefault()
zoom*=e.deltaY<0?1.1:0.9
draw()
})

let dragging=false
let lastX,lastY

canvas.addEventListener("mousedown",e=>{
dragging=true
lastX=e.clientX
lastY=e.clientY
})

canvas.addEventListener("mousemove",e=>{

if(!dragging)return

panX+=e.clientX-lastX
panY+=e.clientY-lastY

lastX=e.clientX
lastY=e.clientY

draw()

})

canvas.addEventListener("mouseup",()=>dragging=false)

const divider=document.getElementById("divider")
const panel=document.getElementById("panel")

let resizing=false

divider.addEventListener("mousedown",()=>resizing=true)

document.addEventListener("mousemove",e=>{
if(!resizing)return
panel.style.width=e.clientX+"px"
})

document.addEventListener("mouseup",()=>resizing=false)

function exportPDF(){

readLines()

const {jsPDF}=window.jspdf

let pdf=new jsPDF({
orientation:"portrait",
unit:"mm",
format:"a3"
})

let pts=calculatePoints()

pts=pts.map(p=>[p[0]*flip,p[1]])

let rad=rotation*Math.PI/180

pts=pts.map(p=>[
p[0]*Math.cos(rad)-p[1]*Math.sin(rad),
p[0]*Math.sin(rad)+p[1]*Math.cos(rad)
])

let pageWidth=pdf.internal.pageSize.getWidth()
let pageHeight=pdf.internal.pageSize.getHeight()

pdf.rect(8,8,pageWidth-16,pageHeight-16)

let xs=pts.map(p=>p[0])
let ys=pts.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)
let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let scale=10

let offsetX=(pageWidth-(maxx-minx)*scale)/2-minx*scale
let offsetY=(pageHeight-(maxy-miny)*scale)/2

pdf.setDrawColor(200,0,0)

for(let i=0;i<pts.length-1;i++){

let x1=pts[i][0]*scale+offsetX
let y1=(maxy-pts[i][1])*scale+offsetY

let x2=pts[i+1][0]*scale+offsetX
let y2=(maxy-pts[i+1][1])*scale+offsetY

pdf.line(x1,y1,x2,y2)

let dx=x2-x1
let dy=y2-y1
let len=Math.sqrt(dx*dx+dy*dy)

let nx=-dy/len
let ny=dx/len

let mx=(x1+x2)/2 + nx*6
let my=(y1+y2)/2 + ny*6

pdf.setFontSize(9)
pdf.text(lines[i].length.toFixed(2)+"m",mx,my)

}

let img=new Image()

img.onload=function(){

pdf.addImage(img,"PNG",pageWidth-108,pageHeight-33,100,25)

pdf.save("site-plan.pdf")

}

img.onerror=function(){
pdf.save("site-plan.pdf")
}

img.src="logos.png"

}

addLineRow()
addLineRow()
addLineRow()

</script>

</body>
</html>
