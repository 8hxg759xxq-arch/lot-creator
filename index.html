<!DOCTYPE html>
<html>
<head>

<title>Lot Site Plan Designer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f3f5f7;
}

header{
background:#1e293b;
color:white;
padding:14px 20px;
font-size:18px;
font-weight:600;
}

#container{
display:flex;
height:calc(100vh - 52px);
}

.controls{
width:360px;
background:white;
padding:20px;
box-shadow:2px 0 8px rgba(0,0,0,0.08);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
border-bottom:1px solid #eee;
padding:6px;
text-align:center;
}

input{
width:60px;
padding:4px;
border:1px solid #ddd;
border-radius:4px;
}

select{
padding:4px;
}

button{
margin-top:10px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

canvas{
background:white;
flex:1;
cursor:grab;
}

.area{
margin-top:15px;
font-weight:600;
}

</style>

</head>

<body>

<header>Lot Site Plan Designer</header>

<div id="container">

<div class="controls">

<h3>Start Direction</h3>

<select id="startDirection">
<option value="0">East</option>
<option value="90">North</option>
<option value="180">West</option>
<option value="270">South</option>
</select>

<h3>Boundary Direction</h3>

<select id="directionMode">
<option value="cw">Clockwise</option>
<option value="ccw">Counter Clockwise</option>
</select>

<h3>Boundary Input</h3>

<table id="lineTable">

<tr>
<th>Length</th>
<th>°</th>
<th>'</th>
<th>"</th>
<th>Type</th>
</tr>

</table>

<button onclick="addLineRow()">Add Line</button>
<button onclick="generateLot()">Generate Lot</button>
<button onclick="autoCloseLot()">Auto Close Lot</button>

<h3>Tools</h3>

<button onclick="rotateLot()">Rotate Lot</button>
<button onclick="flipLot()">Flip Lot</button>
<button onclick="exportPDF()">Export A3</button>

<div id="area" class="area"></div>

</div>

<canvas id="canvas" width="1200" height="800"></canvas>

</div>

<script>

let lines=[]
let points=[]
let rotation=0
let flipX=1
let panX=0
let panY=0

function addLineRow(){

let table=document.getElementById("lineTable")

let row=table.insertRow()

for(let i=0;i<4;i++){

let cell=row.insertCell()
let input=document.createElement("input")
cell.appendChild(input)

}

let typeCell=row.insertCell()

let select=document.createElement("select")

select.innerHTML=`
<option value="interior">Interior</option>
<option value="external">External</option>
`

typeCell.appendChild(select)

}

function generateLot(){

lines=[]

let rows=document.querySelectorAll("#lineTable tr")

rows.forEach((row,i)=>{

if(i===0)return

let cells=row.querySelectorAll("input")
let type=row.querySelector("select").value

let length=parseFloat(cells[0].value)

let d=parseFloat(cells[1].value)||0
let m=parseFloat(cells[2].value)||0
let s=parseFloat(cells[3].value)||0

let angle=d+(m/60)+(s/3600)

if(!isNaN(length)){
lines.push({length,angle,type})
}

})

draw()

}

function calculatePoints(){

let pts=[[0,0]]

let direction=parseFloat(
document.getElementById("startDirection").value
)*Math.PI/180

let mode=document.getElementById("directionMode").value

let x=0
let y=0

lines.forEach((l)=>{

x+=l.length*Math.cos(direction)
y+=l.length*Math.sin(direction)

pts.push([x,y])

let turn

if(l.type==="interior"){
turn=(180-l.angle)*Math.PI/180
}else{
turn=l.angle*Math.PI/180
}

if(mode==="cw"){
direction-=turn
}else{
direction+=turn
}

})

return pts

}

function autoCloseLot(){

generateLot()

let pts=calculatePoints()

let last=pts[pts.length-1]

let dx=0-last[0]
let dy=0-last[1]

let length=Math.sqrt(dx*dx+dy*dy)

alert("Closing boundary length = "+length.toFixed(2)+"m")

}

function draw(){

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,canvas.width,canvas.height)

points=calculatePoints()

let xs=points.map(p=>p[0])
let ys=points.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)
let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let scale=Math.min(
900/(maxx-minx||1),
600/(maxy-miny||1)
)

let screen=[]

points.forEach(p=>{

let x=(p[0]-minx)*scale+150
let y=700-(p[1]-miny)*scale

screen.push([x,y])

})

ctx.beginPath()

screen.forEach((p,i)=>{

if(i===0)ctx.moveTo(p[0],p[1])
else ctx.lineTo(p[0],p[1])

})

ctx.stroke()

drawDimensions(ctx,screen)
drawCornerAngles(ctx,screen)

let area=polygonArea(points)

document.getElementById("area").innerText="Area: "+area.toFixed(2)+" m²"

}

function drawDimensions(ctx,screen){

ctx.font="11px Arial"

for(let i=0;i<screen.length-1;i++){

let p1=screen[i]
let p2=screen[i+1]

let dx=p2[0]-p1[0]
let dy=p2[1]-p1[1]

let len=Math.sqrt(dx*dx+dy*dy)

let nx=-dy/len
let ny=dx/len

let offset=20

let mx=(p1[0]+p2[0])/2 + nx*offset
let my=(p1[1]+p2[1])/2 + ny*offset

ctx.fillText(lines[i].length.toFixed(2)+"m",mx,my)

}

}

function drawCornerAngles(ctx,screen){

ctx.font="11px Arial"

for(let i=1;i<screen.length-1;i++){

let p=screen[i]
let angle=lines[i].angle

ctx.fillText(angle.toFixed(0)+"°",p[0]+6,p[1]-6)

}

}

function rotateLot(){
rotation+=90
draw()
}

function flipLot(){
flipX*=-1
draw()
}

function polygonArea(points){

let area=0

for(let i=0;i<points.length;i++){

let j=(i+1)%points.length

area+=points[i][0]*points[j][1]
area-=points[j][0]*points[i][1]

}

return Math.abs(area/2)

}

function exportPDF(){

const {jsPDF}=window.jspdf

let pdf=new jsPDF({
orientation:"portrait",
unit:"mm",
format:"a3"
})

let pageWidth=pdf.internal.pageSize.getWidth()
let pageHeight=pdf.internal.pageSize.getHeight()

pdf.rect(8,8,pageWidth-16,pageHeight-16)

let xs=points.map(p=>p[0])
let ys=points.map(p=>p[1])

let minx=Math.min(...xs)
let maxx=Math.max(...xs)
let miny=Math.min(...ys)
let maxy=Math.max(...ys)

let lotWidth=maxx-minx
let lotHeight=maxy-miny

let scale=Math.min(260/(lotWidth||1),360/(lotHeight||1))

let offsetX=(pageWidth-lotWidth*scale)/2-minx*scale
let offsetY=(pageHeight-lotHeight*scale)/2

pdf.setDrawColor(200,0,0)

for(let i=0;i<points.length-1;i++){

let x1=points[i][0]*scale+offsetX
let y1=(maxy-points[i][1])*scale+offsetY

let x2=points[i+1][0]*scale+offsetX
let y2=(maxy-points[i+1][1])*scale+offsetY

pdf.line(x1,y1,x2,y2)

let mx=(x1+x2)/2
let my=(y1+y2)/2

pdf.setTextColor(0,0,0)
pdf.setFontSize(9)

pdf.text(lines[i].length.toFixed(2)+"m",mx,my)

}

let area=polygonArea(points)

pdf.text("SITE PLAN",20,20)
pdf.text("Lot Area: "+area.toFixed(2)+" m²",20,30)

let nx=pageWidth-40
let ny=40

pdf.line(nx,ny,nx,ny-20)
pdf.line(nx,ny-20,nx-4,ny-14)
pdf.line(nx,ny-20,nx+4,ny-14)

pdf.text("N",nx-2,ny-24)

let logoWidth=100
let logoHeight=25

let logoX=pageWidth-logoWidth-8
let logoY=pageHeight-logoHeight-8

pdf.addImage("logos.png","PNG",logoX,logoY,logoWidth,logoHeight)

pdf.save("site-plan.pdf")

}

addLineRow()
addLineRow()
addLineRow()

</script>

</body>
</html>
